record:
  name: Record Event
  description: >
    Record a custom event that will appear in the logbook and as an annotation
    on Hass Records history and statistics cards.
  fields:
    message:
      name: Message
      description: Short description of the event (shown in the logbook and as the marker label).
      required: true
      example: "Switched to summer mode"
      selector:
        text:
    annotation:
      name: Annotation
      description: >
        Detailed tooltip text shown when hovering over the annotation marker in
        chart cards. Defaults to the message if not provided.
      required: false
      example: "Thermostat set to 22°C for summer schedule"
      selector:
        text:
          multiline: true
    entity_id:
      name: Entity
      description: >
        Optional entity to associate this event with. When supplied, the
        history and statistics cards can filter events to only show those
        relevant to the displayed entity.
      required: false
      example: "climate.living_room"
      selector:
        entity:
    icon:
      name: Icon
      description: MDI icon name for the annotation marker. Defaults to mdi:bookmark.
      required: false
      example: "mdi:thermometer"
      selector:
        icon:
          placeholder: mdi:bookmark
    color:
      name: Color
      description: Hex color for the annotation marker. Defaults to #03a9f4.
      required: false
      example: "#ff5722"
      selector:
        color_rgb:
